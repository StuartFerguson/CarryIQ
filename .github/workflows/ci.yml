name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CarryIQ.sln

      - name: Build
        run: dotnet build CarryIQ.sln -c Release --no-restore

      - name: Test
        run: dotnet test CarryIQ.sln -c Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx"

      - name: Publish app
        run: dotnet publish src/CarryIQ.App/CarryIQ.App.csproj -c Release -r win-x64 --self-contained true -o artifacts/publish

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage.cobertura.xml'

      - name: Upload packaged app
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carryiq-win-x64
          path: artifacts/publish
